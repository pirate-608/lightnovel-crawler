name: Run Crawler

on:
  workflow_dispatch:
    inputs:
      urls:
        description: '输入小说目录页网址(多个网址请用空格分隔)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  crawl:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('src/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Setup Edge (PowerShell)
      shell: pwsh
      run: |
        $edgePath = "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe"
        if (Test-Path $edgePath) {
          $edgeVersion = (Get-Item $edgePath).VersionInfo.ProductVersion
          Write-Host "Edge stable is already installed @ $edgePath"
          Write-Host "Edge version: $edgeVersion"
        } else {
          Write-Host "Edge not found, installing..."
          choco install microsoft-edge -y
        }

    - name: Download Edge WebDriver
      shell: powershell
      run: |
        $edgePath = "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe"
        $edgeVersion = (Get-Item $edgePath).VersionInfo.ProductVersion
        $majorVersion = $edgeVersion.Split(".")[0]
        Write-Host "Edge version: $edgeVersion (Major: $majorVersion)"

        $driverDir = "$env:GITHUB_WORKSPACE\webdriver"
        mkdir -Force $driverDir

        # 动态获取最新驱动下载链接
        $driverVersionUrl = "https://msedgedriver.azureedge.net/LATEST_RELEASE_$majorVersion"
        $driverVersion = Invoke-WebRequest -Uri $driverVersionUrl -UseBasicParsing | Select-Object -ExpandProperty Content
        $driverZipUrl = "https://msedgedriver.azureedge.net/$driverVersion/edgedriver_win64.zip"

        Write-Host "Downloading WebDriver from: $driverZipUrl"
        Invoke-WebRequest -Uri $driverZipUrl -OutFile "$driverDir\msedgedriver.zip" -ErrorAction Stop

        Expand-Archive -Path "$driverDir\msedgedriver.zip" -DestinationPath $driverDir -Force
        Copy-Item -Path "$driverDir\msedgedriver.exe" -Destination "$env:GITHUB_WORKSPACE\msedgedriver.exe" -Force
        Write-Host "Edge WebDriver installed to: $env:GITHUB_WORKSPACE\msedgedriver.exe"

        echo "$env:GITHUB_WORKSPACE" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium requests
    
    - name: Run crawler
      env:
        PYTHONIOENCODING: utf8
      run: |
        $urls = "${{ github.event.inputs.urls }}".Split(' ') | ForEach-Object { $_.Trim() }
        foreach ($url in $urls) {
          echo $url | python src/clawler.py
        }
      shell: pwsh
    
    - name: Upload novels
      uses: actions/upload-artifact@v4
      with:
        name: novels
        path: 'novel/*.txt'
        
    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add novel/*.txt
        git commit -m "Add new novels" || echo "No changes to commit"
        git push